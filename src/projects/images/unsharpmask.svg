<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">
  <defs>
    <filter id="blurFX">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="sharpGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="160" height="110" fill="#0f1117"/>
  <!-- Blurry left side -->
  <rect x="8" y="15" width="70" height="80" fill="#181818"/>
  <circle cx="43" cy="55" r="22" fill="#3a3a3a" filter="url(#blurFX)"/>
  <text x="12" y="105" fill="#444" font-size="7" font-family="monospace">Blurred</text>
  <!-- Arrow -->
  <line x1="82" y1="55" x2="92" y2="55" stroke="#aaa" stroke-width="2" marker-end="url(#ua)"/>
  <defs>
    <marker id="ua" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#aaa"/>
    </marker>
  </defs>
  <!-- Sharp right side -->
  <rect x="96" y="15" width="58" height="80" fill="#181818"/>
  <circle cx="125" cy="55" r="22" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="125" cy="55" r="16" fill="none" stroke="#ccc" stroke-width="0.8"/>
  <circle cx="125" cy="55" r="10" fill="#fff" opacity="0.1"/>
  <line x1="113" y1="43" x2="137" y2="67" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <line x1="137" y1="43" x2="113" y2="67" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <text x="108" y="105" fill="#444" font-size="7" font-family="monospace">Sharp</text>
  <!-- Label -->
  <text x="80" y="8" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Unsharp Mask</text>
</svg>
