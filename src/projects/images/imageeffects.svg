<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">
  <rect width="160" height="110" fill="#0f1117"/>
  <!-- Source image (left half) -->
  <rect x="10" y="15" width="65" height="80" rx="2" fill="#1a1a2e"/>
  <rect x="14" y="19" width="57" height="72" fill="#222"/>
  <!-- Abstract image content -->
  <circle cx="42" cy="55" r="20" fill="#2a4a3e" opacity="0.8"/>
  <rect x="18" y="35" width="20" height="15" fill="#3a3a1e" opacity="0.6"/>
  <!-- Divider -->
  <line x1="80" y1="10" x2="80" y2="100" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="80" y="8" text-anchor="middle" fill="#555" font-size="7" font-family="monospace">VS</text>
  <!-- Processed image (right half) with colorful effects -->
  <rect x="85" y="15" width="65" height="80" rx="2" fill="#1a1a2e"/>
  <rect x="89" y="19" width="57" height="72" fill="#111"/>
  <!-- Colorful filter effects -->
  <circle cx="117" cy="55" r="20" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
  <circle cx="117" cy="55" r="14" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.6"/>
  <circle cx="117" cy="55" r="8" fill="#f7dc6f" opacity="0.5"/>
  <!-- Glitch lines -->
  <rect x="89" y="42" width="57" height="3" fill="#ff6b6b" opacity="0.3"/>
  <rect x="89" y="68" width="57" height="2" fill="#4ecdc4" opacity="0.3"/>
  <!-- Label -->
  <text x="80" y="107" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Effects Studio</text>
</svg>
