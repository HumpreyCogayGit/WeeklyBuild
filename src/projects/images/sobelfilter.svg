<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">
  <rect width="160" height="110" fill="#0f1117"/>
  <!-- Left: original photo (grayscale blocks) -->
  <rect x="8" y="15" width="66" height="80" rx="2" fill="#1c1c1c"/>
  <!-- Soft photo content -->
  <rect x="12" y="19" width="58" height="72" fill="#2a2a2a"/>
  <circle cx="41" cy="45" r="14" fill="#3a3a3a"/>
  <rect x="16" y="62" width="50" height="24" fill="#333"/>
  <!-- Divider arrow -->
  <line x1="78" y1="55" x2="88" y2="55" stroke="#e5e5e5" stroke-width="2" marker-end="url(#sarrow)"/>
  <defs>
    <marker id="sarrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e5e5e5"/>
    </marker>
  </defs>
  <!-- Right: Sobel edge output -->
  <rect x="91" y="15" width="62" height="80" rx="2" fill="#000"/>
  <!-- Edge lines simulating Sobel output -->
  <circle cx="122" cy="42" r="14" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="95" y1="62" x2="149" y2="62" stroke="#ddd" stroke-width="0.8"/>
  <line x1="95" y1="64" x2="149" y2="64" stroke="#888" stroke-width="0.5"/>
  <line x1="108" y1="20" x2="108" y2="92" stroke="#ddd" stroke-width="0.8"/>
  <!-- Gradient edge highlight -->
  <line x1="100" y1="30" x2="144" y2="30" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="95" y1="78" x2="130" y2="78" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Label -->
  <text x="80" y="107" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Sobel Edge Filter</text>
</svg>
