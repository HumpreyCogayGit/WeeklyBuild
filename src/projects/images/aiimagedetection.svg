<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">
  <rect width="160" height="110" fill="#0f1117"/>
  <!-- Axes -->
  <line x1="20" y1="90" x2="150" y2="90" stroke="#444" stroke-width="1"/>
  <line x1="20" y1="15" x2="20" y2="90" stroke="#444" stroke-width="1"/>
  <!-- Benford's law bar chart - leading digits 1-9 -->
  <!-- Digit 1: ~30% -->
  <rect x="26" y="40" width="11" height="50" fill="#4a9eff" opacity="0.8"/>
  <!-- Digit 2: ~17% -->
  <rect x="40" y="61" width="11" height="29" fill="#4a9eff" opacity="0.7"/>
  <!-- Digit 3: ~12% -->
  <rect x="54" y="70" width="11" height="20" fill="#4a9eff" opacity="0.6"/>
  <!-- Digit 4: ~9% -->
  <rect x="68" y="74" width="11" height="16" fill="#4a9eff" opacity="0.6"/>
  <!-- Digit 5: ~8% -->
  <rect x="82" y="77" width="11" height="13" fill="#4a9eff" opacity="0.5"/>
  <!-- Digit 6: ~7% -->
  <rect x="96" y="79" width="11" height="11" fill="#4a9eff" opacity="0.5"/>
  <!-- Digit 7: ~6% -->
  <rect x="110" y="81" width="11" height="9" fill="#4a9eff" opacity="0.4"/>
  <!-- Digit 8: ~5% -->
  <rect x="124" y="83" width="11" height="7" fill="#4a9eff" opacity="0.4"/>
  <!-- Benford curve overlay -->
  <path d="M31 40 Q45 61 60 70 Q74 76 88 79 Q102 81 116 83 Q130 84 141 85" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Labels -->
  <text x="85" y="105" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Benford's Law / DCT</text>
  <!-- Axis tick labels -->
  <text x="31" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">1</text>
  <text x="45" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">2</text>
  <text x="59" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">3</text>
  <text x="73" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">4</text>
  <text x="87" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">5</text>
  <text x="101" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">6</text>
  <text x="115" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">7</text>
  <text x="129" y="98" text-anchor="middle" fill="#444" font-size="7" font-family="monospace">8</text>
</svg>
